<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #62F6A8;
      --color-primary-container:    #1A3D2B;
      --color-on-primary:           #08111F;
      /* === 背景 / 表面 === */
      --color-background:                 #08111F;
      --color-surface-container-lowest:   #0A1525;
      --color-surface:                    #0E1A2D;
      --color-surface-container:          #132240;
      --color-surface-container-high:     #1A2D52;
      --color-surface-container-highest:  #1D2B44;
      /* === 文字 === */
      --color-on-surface:           #E6EDF7;
      --color-on-surface-variant:   #8EA0B8;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #1D2B44;
      --color-outline-variant:  #253A5C;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.3);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.4);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

            <span id="btn-login-text">登录</span>

              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>

          <!-- 用户协议提示 -->

              </div>

  <!-- 登录成功 Toast -->
  <div id="toast-login-success" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 hidden">

      <div class="w-6 h-6 rounded-full bg-success/15 flex items-center justify-center shrink-0">
        <i data-lucide="check" class="w-3.5 h-3.5 text-success"></i>

      <span class="text-sm font-medium text-on-surface">登录成功，欢迎回到知乎</span>

  <!-- 验证码发送成功 Toast -->
  <div id="toast-code-sent" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-surface-container-high rounded-lg shadow-float px-5 py-3 flex items-center gap-2.5 border border-outline-variant/20">

      </div>
      <span class="text-sm font-medium text-on-surface">验证码已发送至手机</span>
    </div>
  </div>

  <script>lucide.createIcons();</script>

  <script>
    $(function () {
      // === Tab 切换 ===
      $('#login-tabs').on('click', 'button', function () {
        var tab = $(this).data('tab');

        // 更新 tab 样式
        $('#login-tabs button').removeClass('bg-primary/10 text-primary').addClass('text-on-surface-variant');
        $(this).removeClass('text-on-surface-variant').addClass('bg-primary/10 text-primary');

        // 切换表单
        if (tab === 'phone') {
          $('#form-phone').removeClass('hidden');
          $('#form-password').addClass('hidden');
        } else {
          $('#form-phone').addClass('hidden');
          $('#form-password').removeClass('hidden');
        }
      });

      // === 密码显示/隐藏切换 ===
      $('#btn-toggle-pwd').on('click', function () {
        var input = $('#input-password');
        var isPassword = input.attr('type') === 'password';

        if (isPassword) {
          input.attr('type', 'text');
          $('#icon-eye-off').addClass('hidden');
          $('#icon-eye-on').removeClass('hidden');
        } else {
          input.attr('type', 'password');
          $('#icon-eye-off').removeClass('hidden');
          $('#icon-eye-on').addClass('hidden');
        }
        // 重新渲染图标
        lucide.createIcons();
      });

      // === 发送验证码 ===
      $('#btn-send-code').on('click', function () {
        var $btn = $(this);
        if ($btn.hasClass('opacity-50')) return; // 倒计时中不可点击

        // 显示发送成功 toast
        $('#toast-code-sent').removeClass('hidden');
        setTimeout(function () {
          $('#toast-code-sent').addClass('hidden');
        }, 2500);

        // 倒计时 60s
        var seconds = 60;
        $btn.addClass('opacity-50').text(seconds + 's 后重发');

        var timer = setInterval(function () {
          seconds--;
          if (seconds <= 0) {
            clearInterval(timer);
            $btn.removeClass('opacity-50').text('发送验证码');
          } else {
            $btn.text(seconds + 's 后重发');
          }
        }, 1000);
      });

      // === 登录按钮 ===
      $('#btn-login').on('click', function () {
        var $btn = $(this);
        var $text = $('#btn-login-text');
        var $spinner = $('#btn-login-spinner');

        // 显示 loading 状态
        $btn.addClass('opacity-80 pointer-events-none');
        $text.text('登录中');
        $spinner.removeClass('hidden');

        // 模拟登录请求
        setTimeout(function () {
          // 恢复按钮状态
          $btn.removeClass('opacity-80 pointer-events-none');
          $text.text('登录');
          $spinner.addClass('hidden');

          // 显示登录成功 toast
          $('#toast-login-success').removeClass('hidden');
          setTimeout(function () {
            $('#toast-login-success').addClass('hidden');
          }, 3000);
        }, 1800);
      });

      // === 第三方登录 ===
      $('#btn-wechat-login').on('click', function () {
        console.log('需要调用微信 OAuth 接口实现微信登录');
      });

      $('#btn-qq-login').on('click', function () {
        console.log('需要调用 QQ OAuth 接口实现 QQ 登录');
      });

      $('#btn-weibo-login').on('click', function () {
        console.log('需要调用微博 OAuth 接口实现微博登录');
      });

      // === 忘记密码 ===
      $('#link-forgot-pwd').on('click', function (e) {
        e.preventDefault();
        console.log('需要跳转到忘记密码页面');
      });

      // === 注册链接 ===
      $('#link-register').on('click', function (e) {
        e.preventDefault();
        console.log('需要跳转到注册页面');
      });

      // === 协议链接 ===
      $('a[href="#"]').on('click', function (e) {
        if ($(this).attr('id') === 'link-forgot-pwd' || $(this).attr('id') === 'link-register') return;
        e.preventDefault();
      });
    });
  </script>
</body>
