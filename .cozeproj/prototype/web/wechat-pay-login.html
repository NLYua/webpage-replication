<!DOCTYPE html>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #62F6A8;
      --color-primary-container:    #1A3D2B;
      --color-on-primary:           #08111F;
      /* === 背景 / 表面 === */
      --color-background:                 #08111F;
      --color-surface-container-lowest:   #0A1525;
      --color-surface:                    #0E1A2D;
      --color-surface-container:          #132240;
      --color-surface-container-high:     #1A2D52;
      --color-surface-container-highest:  #1D2B44;
      /* === 文字 === */
      --color-on-surface:           #E6EDF7;
      --color-on-surface-variant:   #8EA0B8;
      /* === 功能色 === */

      --color-error:    #ef4444;

      --shadow-float:  0 10px 25px rgba(0,0,0,0.4);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */

      --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

              <div id="captcha-image" class="w-[120px] h-[42px] rounded-md bg-surface-container-high flex items-center justify-center cursor-pointer select-none overflow-hidden shrink-0 hover:opacity-80 transition-opacity" title="点击刷新验证码">

  <!-- Toast 提示 -->
  <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 hidden">
    <div id="toast-inner" class="flex items-center gap-2 px-5 py-3 rounded-lg shadow-dialog text-sm font-medium">
      <i data-lucide="check-circle" class="w-5 h-5 hidden" id="toast-icon-success"></i>
      <i data-lucide="x-circle" class="w-5 h-5 hidden" id="toast-icon-error"></i>
      <span id="toast-message"></span>
    </div>
  </div>

  <script>
    $(function () {
      // ========== 密码显示/隐藏切换 ==========
      var passwordVisible = false;
      $('#btn-toggle-password').on('click', function () {
        passwordVisible = !passwordVisible;
        if (passwordVisible) {
          $('#input-password').attr('type', 'text');
          $('#icon-eye-off').addClass('hidden');
          $('#icon-eye-on').removeClass('hidden');
        } else {
          $('#input-password').attr('type', 'password');
          $('#icon-eye-off').removeClass('hidden');
          $('#icon-eye-on').addClass('hidden');
        }
        lucide.createIcons();
      });

      // ========== 验证码刷新 ==========
      var captchaChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      function generateCaptcha() {
        var code = '';
        for (var i = 0; i < 4; i++) {
          code += captchaChars.charAt(Math.floor(Math.random() * captchaChars.length));
        }
        return code;
      }

      $('#captcha-image').on('click', function () {
        var newCode = generateCaptcha();
        $('#captcha-text').text(newCode);
        // 添加刷新动画
        $(this).css('transform', 'scale(0.95)');
        var self = this;
        setTimeout(function () {
          $(self).css('transform', 'scale(1)');
        }, 150);
      });

      // ========== Toast 提示 ==========
      function showToast(message, type) {
        // type: 'success' 或 'error'
        var $toast = $('#toast');
        var $inner = $('#toast-inner');
        var $msg = $('#toast-message');

        $inner.removeClass('bg-success/15 text-success bg-error/15 text-error');
        $('#toast-icon-success').addClass('hidden');
        $('#toast-icon-error').addClass('hidden');

        if (type === 'success') {
          $inner.addClass('bg-success/15 text-success');
          $('#toast-icon-success').removeClass('hidden');
        } else {
          $inner.addClass('bg-error/15 text-error');
          $('#toast-icon-error').removeClass('hidden');
        }

        $msg.text(message);
        $toast.removeClass('hidden');
        lucide.createIcons();

        // 3秒后自动关闭
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(function () {
          $toast.addClass('hidden');
        }, 3000);
      }

      // ========== 登录按钮点击 ==========
      $('#login-form').on('submit', function (e) {
        e.preventDefault();
      });

      $('#btn-login').on('click', function () {
        var username = $('#input-username').val().trim();
        var password = $('#input-password').val().trim();
        var captcha = $('#input-captcha').val().trim();

        // 表单验证
        if (!username) {
          showToast('请输入用户名', 'error');
          $('#input-username').focus();
          return;
        }
        if (!password) {
          showToast('请输入密码', 'error');
          $('#input-password').focus();
          return;
        }
        if (!captcha) {
          showToast('请输入验证码', 'error');
          $('#input-captcha').focus();
          return;
        }

        // 显示验证中状态
        var $btn = $(this);
        var $text = $('#btn-login-text');
        var $spinner = $('#btn-login-spinner');

        $btn.prop('disabled', true);
        $text.text('验证中...');
        $spinner.removeClass('hidden');

        // 模拟登录过程
        setTimeout(function () {
          $btn.prop('disabled', false);
          $text.text('登 录');
          $spinner.addClass('hidden');

          // demo项目不判断账密，直接显示成功
          showToast('登录成功，正在跳转...', 'success');

          // 模拟跳转延迟
          setTimeout(function () {
            // 登录成功后跳转到首页
            window.location.href = 'home.html';
          }, 1500);
        }, 2000);
      });

      // ========== 底部链接点击 ==========
      $('#link-forgot-password').on('click', function (e) {
        e.preventDefault();
        console.log('忘记密码 - 后续应实现：1. 跳转到找回密码页面；2. 页面包含商户号输入、手机号验证、新密码设置等步骤；3. 支持短信验证码和邮箱验证两种方式');
      });

      $('#link-register').on('click', function (e) {
        e.preventDefault();
        console.log('注册账号 - 后续应实现：1. 跳转到商户注册页面；2. 页面包含商户类型选择、资质信息填写、联系人信息、结算账户等步骤；3. 提交后进入审核流程');
      });
    });
  </script>

  <script>lucide.createIcons();</script>
</body>
