<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #16A34A;
      --color-primary-container:    #DCFCE7;
      --color-on-primary:           #FFFFFF;
      /* === 背景 / 表面 === */
      --color-background:                 #FFFFFF;
      --color-surface-container-lowest:   #F8FAFC;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F5F9;
      --color-surface-container-high:     #E2E8F0;
      --color-surface-container-highest:  #CBD5E1;
      /* === 文字 === */
      --color-on-surface:           #1E293B;
      --color-on-surface-variant:   #64748B;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #E2E8F0;
      --color-outline-variant:  #CBD5E1;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.1);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-6 border-b border-outline-variant/20">
    <div class="flex items-center gap-2">
      <i data-lucide="copy" class="text-primary w-5 h-5"></i>
      <span class="font-bold text-base text-on-surface">WebClone</span>
      <span class="text-xs text-on-surface-variant ml-1 font-mono bg-surface-container px-1.5 py-0.5 rounded">v1.0</span>
    </div>
    <nav class="flex items-center gap-1">
      <a href="home.html" class="nav-link px-3 py-1.5 text-sm font-medium text-primary bg-primary/10 rounded-md" aria-current="page">总览</a>
      <a href="baidu.html" class="nav-link px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">百度首页</a>
      <a href="wechat-pay-login.html" class="nav-link px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">微信支付登录</a>
      <a href="zhihu-login.html" class="nav-link px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">知乎登录</a>
      <a href="evaluation.html" class="nav-link px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">一致性评估</a>
    </nav>
    <div class="flex items-center gap-2">
      <button id="run-eval-btn" class="bg-primary text-on-primary px-3 py-1.5 rounded-md text-sm font-medium hover:opacity-90 transition-opacity flex items-center gap-1.5">
        <i data-lucide="play" class="w-3.5 h-3.5"></i>运行评估
      </button>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <!-- @main-content:start -->
  <main class="max-w-7xl mx-auto p-6">
    <!-- 页面内容由子 Agent 填充 -->
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
